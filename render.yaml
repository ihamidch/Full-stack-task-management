# Render Blueprint — set env vars in the Render dashboard (do not commit secrets).
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: saas-task-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      # Add in dashboard: MONGODB_URI, JWT_SECRET, CLIENT_URL (your Vercel URL)
